<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Career Copilot · An operating system for exam prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter','ui-sans-serif','system-ui'],
          serif: ['Fraunces','Georgia','serif'],
          mono: ['"JetBrains Mono"','ui-monospace','monospace'],
        },
        colors: {
          clay: {50:'#FBF6EF',100:'#F3EADB',200:'#E7D6BA',300:'#D6BC93',400:'#BE9C6B',500:'#A68057',600:'#8A6846',700:'#6C5038',800:'#4E3A29',900:'#2E2218'},
          sage: {50:'#F0F5EF',100:'#DAE7D6',200:'#B9CFAF',300:'#94B28A',400:'#719468',500:'#54794E',600:'#41603D',700:'#33482F',800:'#263623',900:'#172017'},
          dusk: {50:'#F2F1F4',100:'#DDDAE3',200:'#B7B0C4',300:'#8F86A1',400:'#6D637F',500:'#524864',600:'#40384E',700:'#31293B',800:'#221D2A',900:'#141018'},
          ink:'#2E2218', paper:'#FBF6EF',
        }
      }
    }
  }
</script>
<style>
  html, body { background:#FBF6EF; color:#2E2218; }
  body { font-family:'Inter',sans-serif; letter-spacing:-0.005em; }
  h1,h2,h3,h4 { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.025em; font-weight:600; }

  /* surfaces */
  .linen-bg {
    background:
      radial-gradient(60% 50% at 12% 6%,  rgba(214,188,147,0.20), transparent 65%),
      radial-gradient(45% 40% at 88% 10%, rgba(113,148,104,0.14), transparent 60%),
      radial-gradient(55% 50% at 92% 92%, rgba(190,156,107,0.10), transparent 65%),
      linear-gradient(180deg,#FBF6EF 0%, #F8F3EA 60%, #F4EEE1 100%);
  }
  .soft-card {
    background: rgba(255,253,248,0.94);
    border: 1px solid #E7DECB;
    border-radius: 18px;
    box-shadow: 0 1px 2px rgba(46,34,24,0.04), 0 10px 28px -20px rgba(46,34,24,0.10);
  }
  .grain::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    opacity:0.05; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .hairline { height:1px; background:linear-gradient(90deg,transparent,#D6C9AC,transparent); }

  .eyebrow { font-size:10.5px; letter-spacing:0.22em; text-transform:uppercase; font-weight:600; color:rgba(46,34,24,0.55); }
  .num-mono { font-variant-numeric:tabular-nums; font-family:'JetBrains Mono',monospace; }

  .pill { display:inline-flex; align-items:center; gap:0.35rem; padding:3px 9px; border-radius:999px; font-size:10.5px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
  .pill-sage { background:#E4EDE0; color:#33482F; }
  .pill-clay { background:#F1E1CD; color:#6C5038; }
  .pill-dusk { background:#E3DFEA; color:#40384E; }
  .pill-amber{ background:#F3E9CF; color:#6F5A22; }
  .pill-ink  { background:#2E2218; color:#FBF6EF; }
  .pill-outline { background:transparent; border:1px solid #DCD0B6; color:#4E3A29; }

  .stamp { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; padding:2px 6px; border-radius:4px; display:inline-flex; align-items:center; gap:5px; }
  .stamp-verified { background:#54794E; color:#F0F5EF; }
  .stamp-needs    { background:#FBF8F2; color:#524864; border:1px dashed #8F86A1; }

  .chip { display:inline-flex; align-items:center; gap:5px; padding:2px 7px; border-radius:6px; font-size:10.5px; font-weight:500; font-family:'JetBrains Mono',ui-monospace,monospace; }
  .chip-user { background:#ECE7F2; color:#31293B; }
  .chip-exam { background:#E4EDE0; color:#33482F; }
  .chip-update { background:#F1E1CD; color:#6C5038; }
  .chip-engine { background:#2E2218; color:#F3EADB; }

  /* button */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; padding:0.7rem 1.25rem; border-radius:999px; font-weight:600; font-size:14px; transition: all 200ms ease; }
  .btn-primary { background:#2E2218; color:#F3EADB; }
  .btn-primary:hover { background:#4E3A29; transform: translateY(-1px); }
  .btn-ghost { background:transparent; color:#2E2218; border:1px solid #E7DECB; }
  .btn-ghost:hover { background:#F3EADB; }

  /* underline on hover */
  .link-under { background-image: linear-gradient(currentColor, currentColor); background-size: 100% 1px; background-repeat: no-repeat; background-position: 0 100%; transition: background-size 300ms; }
  .link-under:hover { background-size: 0 1px; }

  /* verified seal */
  .seal-verified { background: radial-gradient(circle at 30% 30%, #B9CFAF 0%, #54794E 70%); box-shadow: inset 0 0 0 2px #F0F5EF, 0 1px 0 rgba(0,0,0,0.05); }

  /* ticker */
  .marquee { display:flex; gap:3rem; width: max-content; animation: scroll 60s linear infinite; }
  @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* how-it-works step indicator animation */
  @keyframes pulse-dot { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.4); } }
  .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

  @keyframes drift-in { from { opacity: 0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  .drift-in { animation: drift-in 0.5s cubic-bezier(.22,1,.36,1) both; }

  @keyframes draw-line { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
  .draw-line { stroke-dasharray: 100; animation: draw-line 1.6s cubic-bezier(.22,1,.36,1) forwards; }

  @keyframes flow {
    0% { stroke-dashoffset:220; } 100% { stroke-dashoffset:0; }
  }
  .flow-line { stroke-dasharray:4 6; animation:flow 6s linear infinite; }

  @keyframes breathe { 0%,100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.02); opacity: 1; } }
  .breathe { animation: breathe 4.5s ease-in-out infinite; }

  /* card-tilt subtle on hover */
  .lift { transition: transform 280ms cubic-bezier(.22,1,.36,1), box-shadow 280ms; }
  .lift:hover { transform: translateY(-4px); box-shadow: 0 1px 2px rgba(46,34,24,0.04), 0 24px 48px -28px rgba(46,34,24,0.22); }

  /* nav glass */
  .nav-glass { background: rgba(251,246,239,0.78); backdrop-filter: blur(14px) saturate(110%); -webkit-backdrop-filter: blur(14px) saturate(110%); border-bottom: 1px solid rgba(46,34,24,0.06); }

  /* dotted bg subtle */
  .dotted {
    background-image: radial-gradient(rgba(46,34,24,0.08) 1px, transparent 1px);
    background-size: 18px 18px;
  }

  /* focus ring */
  :focus-visible { outline: 2px solid #2E2218; outline-offset: 2px; border-radius: 8px; }

  /* preview card scale-down (today preview) */
  .today-preview { transform-origin: top right; }

  /* tick */
  .tick { width:13px; height:13px; border-radius:50%; border:1.5px solid #C9B68F; display:inline-block; flex:0 0 auto; }
  .tick.done { background:#54794E; border-color:#54794E; }

  /* tab strip */
  .step-tab { display:flex; gap:14px; align-items:center; padding:14px 16px; border-radius:14px; border:1px solid transparent; cursor:pointer; transition: all 220ms; text-align:left; }
  .step-tab:hover { background:#F3EADB; }
  .step-tab.active { background:#2E2218; color:#F3EADB; border-color:#2E2218; }
  .step-tab.active .step-num { background:#F3EADB; color:#2E2218; }
  .step-tab.active .step-sub { color:#D6BC93; }
  .step-num { width:28px; height:28px; border-radius:8px; background:#F3EADB; color:#2E2218; font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

  /* progress bar inside active step */
  .step-progress { height:2px; background:rgba(214,188,147,0.3); border-radius:2px; overflow:hidden; margin-top:6px; }
  .step-progress > i { display:block; height:100%; background:#D6BC93; }

  /* exam logo placeholder */
  .exam-chip { display:flex; align-items:center; gap:8px; padding:8px 14px; border:1px solid #E7DECB; border-radius:999px; background:rgba(255,253,248,0.7); white-space:nowrap; }
  .exam-mark { width:22px; height:22px; border-radius:50%; background:#2E2218; color:#F3EADB; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono', monospace; font-size:9px; font-weight:700; letter-spacing:0; flex-shrink:0; }

  /* faq */
  details.faq summary { cursor:pointer; list-style:none; padding: 20px 0; display:flex; justify-content:space-between; align-items:center; gap:1rem; border-top:1px solid #E7DECB; }
  details.faq summary::-webkit-details-marker { display:none; }
  details.faq[open] summary { border-bottom:0; }
  details.faq[open] summary .faq-icon { transform: rotate(45deg); }
  details.faq .faq-icon { transition: transform 240ms; color:#6C5038; }
  details.faq .faq-body { padding: 0 0 20px; color:#3a2e22; font-size:14px; line-height:1.6; }
  details.faq:last-of-type .faq-body { border-bottom:0; }
  details.faq:last-of-type { border-bottom:1px solid #E7DECB; }

  /* keep at large bp the nav clean on mobile */
  @media (max-width: 760px) {
    .hide-mb { display:none !important; }
  }

</style>
</head>
<body class="linen-bg">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="home.jsx"></script>
</body>
</html>
