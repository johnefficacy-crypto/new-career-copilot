name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm run check:study-copy
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install pip-audit
      # PYSEC-2025-183 (pyjwt "weak encryption") is disputed by the supplier —
      # key length is the application's choice, and our only use of PyJWT is
      # jwt.decode(..., verify_signature=False) for reading unverified claims,
      # which involves no encryption key. No fixed release exists. Ignored
      # here with an explicit ID rather than dropping the audit gate; revisit
      # if upstream ships a fix or our usage changes.
      - run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183
      - run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=60
